name: GTD Sync Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'

env:
  ORIGINAL_REPO: gsd-build/get-shit-done
  FORK_REPO: ${{ github.repository }}
  EMAIL_TO: ${{ secrets.GTD_EMAIL_TO }}
  EMAIL_FROM: ${{ secrets.GTD_EMAIL_FROM }}

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Read sync status
        id: read-status
        run: |
          if [ -f .gtd-sync/sync-status.json ]; then
            echo "last_sync=$(cat .gtd-sync/sync-status.json | jq -r '.last_sync // empty')" >> $GITHUB_OUTPUT
            echo "last_commit=$(cat .gtd-sync/sync-status.json | jq -r '.last_commit // empty')" >> $GITHUB_OUTPUT
            echo "failure_count=$(cat .gtd-sync/sync-status.json | jq -r '.failure_count // 0')" >> $GITHUB_OUTPUT
          else
            echo "last_sync=none" >> $GITHUB_OUTPUT
            echo "last_commit=none" >> $GITHUB_OUTPUT
            echo "failure_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Check for updates from original repo
        id: check-updates
        run: |
          git remote add original https://github.com/${{ env.ORIGINAL_REPO }}.git
          git fetch original main
          
          ORIGINAL_LATEST=$(git rev-parse original/main)
          CURRENT_COMMIT=$(git rev-parse HEAD)
          
          echo "original_latest=$ORIGINAL_LATEST" >> $GITHUB_OUTPUT
          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          
          if [ "$ORIGINAL_LATEST" != "$CURRENT_COMMIT" ] || [ "${{ github.inputs.force_sync }}" == "true" ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
          fi

      - name: No updates available
        if: steps.check-updates.outputs.updates_available == 'false'
        run: |
          echo "No updates available from ${{ env.ORIGINAL_REPO }}"
          echo "Current commit: ${{ steps.check-updates.outputs.current_commit }}"
          echo "Original latest: ${{ steps.check-updates.outputs.original_latest }}"

      - name: Prepare sync directory
        if: steps.check-updates.outputs.updates_available == 'true'
        run: |
          mkdir -p .gtd-sync
          mkdir -p .gtd-sync/failures

      - name: Backup current state
        if: steps.check-updates.outputs.updates_available == 'true'
        run: |
          cp -r . .gtd-sync/backup-pre-sync/ 2>/dev/null || true
          echo "Backup created"

      - name: Merge changes from original
        id: merge
        if: steps.check-updates.outputs.updates_available == 'true'
        run: |
          set +e
          MERGE_RESULT=$(git merge original/main --no-edit 2>&1)
          MERGE_EXIT=$?
          set -e
          
          echo "$MERGE_RESULT" > .gtd-sync/merge-output.txt
          
          if [ $MERGE_EXIT -ne 0 ]; then
            echo "merge_failed=true" >> $GITHUB_OUTPUT
            echo "merge_conflict=true" >> $GITHUB_OUTPUT
            echo "merge_status=conflict" >> $GITHUB_OUTPUT
            echo "Conflict detected during merge"
            git merge --abort || true
          else
            echo "merge_failed=false" >> $GITHUB_OUTPUT
            echo "merge_status=success" >> $GITHUB_OUTPUT
          fi

      - name: Apply transformations
        id: transform
        if: steps.check-updates.outputs.updates_available == 'true' && steps.merge.outputs.merge_failed != 'true'
        run: |
          set +e
          TRANSFORM_ERRORS=""
          
          # Exclude binary files and common non-text directories
          EXCLUDE_PATTERNS="--exclude='.git' --exclude='node_modules' --exclude='dist' --exclude='build' --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.ico' --exclude='*.svg' --exclude='*.woff' --exclude='*.woff2' --exclude='*.ttf' --exclude='*.eot' --exclude='.gtd-sync'"
          
          # Replace profanity with clean alternatives
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/shit/things/g' {} \; 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS shit-replace;"
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/Shit/Things/g' {} \; 2>/dev/null || true
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/SHIT/THINES/g' {} \; 2>/dev/null || true
          
          # Replace gsd- prefixes with gtd-
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/gsd-/gtd-/g' {} \; 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS gsd-prefix;"
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/GSD/GTD/g' {} \; 2>/dev/null || true
          
          # Replace standalone gsd: references
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/gsd:/gtd-/g' {} \; 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS gsd-standalone;"
          find . $EXCLUDE_PATTERNS -type f -exec sed -i "s/\/gsd:/\/gtd-/g" {} \; 2>/dev/null || true
          
          # Rename directories
          find . -type d -name 'gsd-*' 2>/dev/null | while read dir; do
            newdir="${dir//gsd-/gtd-}"
            mv "$dir" "$newdir" 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS dir-rename;"
          done
          
          # Rename files
          find . -type f -name 'gsd-*' 2>/dev/null | while read file; do
            newfile="${file//gsd-/gtd-}"
            mv "$file" "$newfile" 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS file-rename;"
          done
          
          set -e
          
          if [ -n "$TRANSFORM_ERRORS" ]; then
            echo "transform_errors=$TRANSFORM_ERRORS" >> $GITHUB_OUTPUT
            echo "transform_status=partial" >> $GITHUB_OUTPUT
          else
            echo "transform_errors=none" >> $GITHUB_OUTPUT
            echo "transform_status=success" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        id: commit
        if: steps.check-updates.outputs.updates_available == 'true' && steps.merge.outputs.merge_failed != 'true'
        run: |
          set +e
          git add -A
          CHANGES=$(git diff --staged --name-only)
          
          if [ -n "$CHANGES" ]; then
            git commit -m "sync: merge from GSD and apply clean transformations"
            git push origin main
            echo "commit_status=success" >> $GITHUB_OUTPUT
            echo "changes_committed=true" >> $GITHUB_OUTPUT
          else
            echo "commit_status=no-changes" >> $GITHUB_OUTPUT
            echo "changes_committed=false" >> $GITHUB_OUTPUT
          fi
          set -e

      - name: Update sync status
        id: update-status
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p .gtd-sync
          
          # Read existing status or create new
          if [ -f .gtd-sync/sync-status.json ]; then
            STATUS=$(cat .gtd-sync/sync-status.json)
          else
            STATUS='{"sync_history":[],"failure_count":0}'
          fi
          
          # Determine this sync's result
          if [ "${{ steps.check-updates.outputs.updates_available }}" == "true" ]; then
            if [ "${{ steps.merge.outputs.merge_status }}" == "success" ] && [ "${{ steps.commit.outputs.commit_status }}" == "success" ]; then
              RESULT="success"
            elif [ "${{ steps.merge.outputs.merge_status }}" == "conflict" ]; then
              RESULT="conflict"
            else
              RESULT="failed"
            fi
          else
            RESULT="no-update"
          fi
          
          # Build new status
          cat > .gtd-sync/sync-status.json << EOF
          {
            "last_sync": "$TIMESTAMP",
            "last_commit": "${{ steps.check-updates.outputs.original_latest }}",
            "last_result": "$RESULT",
            "failure_count": ${{ steps.read-status.outputs.failure_count }},
            "sync_history": [
              {
                "timestamp": "$TIMESTAMP",
                "result": "$RESULT",
                "original_commit": "${{ steps.check-updates.outputs.original_latest }}",
                "merge_status": "${{ steps.merge.outputs.merge_status }}",
                "transform_status": "${{ steps.transform.outputs.transform_status }}",
                "transform_errors": "${{ steps.transform.outputs.transform_errors }}",
                "commit_status": "${{ steps.commit.outputs.commit_status }}"
              }
            ]
          }
          EOF
          
          echo "Status updated: $RESULT"

      - name: Log failure details
        if: steps.update-status.outputs.last-result == 'failed' || steps.update-updates.outputs.last-result == 'conflict'
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          mkdir -p .gtd-sync/failures
          
          cat > .gtd-sync/failures/failure-$TIMESTAMP.json << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "type": "${{ steps.update-status.outputs.last-result }}",
            "original_commit": "${{ steps.check-updates.outputs.original_latest }}",
            "merge_output": $(cat .gtd-sync/merge-output.txt 2>/dev/null | jq -Rs . || echo "\"see logs\""),
            "transform_errors": "${{ steps.transform.outputs.transform_errors }}"
          }
          EOF

      - name: Send success email
        if: steps.update-status.outputs.last-result == 'success' && env.EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GTD_EMAIL_FROM }}
          password: ${{ secrets.GTD_EMAIL_APP_PASSWORD }}
          secure: true
          from: ${{ secrets.GTD_EMAIL_FROM }}
          to: ${{ secrets.GTD_EMAIL_TO }}
          subject: GTD Sync: Success - ${{ github.repository }}
          body: |
            GTD Sync completed successfully!
            
            Repository: ${{ github.repository }}
            Original Commit: ${{ steps.check-updates.outputs.original_latest }}
            Time: ${{ steps.update-status.outputs.timestamp }}
            
            All transformations applied successfully.

      - name: Send failure email
        if: (steps.update-status.outputs.last-result == 'failed' || steps.update-status.outputs.last-result == 'conflict') && env.EMAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GTD_EMAIL_FROM }}
          password: ${{ secrets.GTD_EMAIL_APP_PASSWORD }}
          secure: true
          from: ${{ secrets.GTD_EMAIL_FROM }}
          to: ${{ secrets.GTD_EMAIL_TO }}
          subject: GTD Sync: ACTION REQUIRED - ${{ github.repository }}
          body: |
            GTD Sync requires attention!
            
            Repository: ${{ github.repository }}
            Failure Type: ${{ steps.update-status.outputs.last-result }}
            Original Commit: ${{ steps.check-updates.outputs.original_latest }}
            Time: ${{ steps.update-status.outputs.timestamp }}
            
            Merge Status: ${{ steps.merge.outputs.merge_status }}
            Transform Errors: ${{ steps.transform.outputs.transform_errors }}
            
            Please review the sync status and resolve manually.

      - name: Create GitHub issue on failure
        if: steps.update-status.outputs.last-result == 'failed' || steps.update-status.outputs.last-result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[GTD Sync] ${{ steps.update-status.outputs.last-result }} - ${new Date().toISOString().slice(0,10)}`,
              body: `## Sync Failure Report
              
              **Type:** ${{ steps.update-status.outputs.last-result }}
              **Time:** ${{ steps.update-status.outputs.timestamp }}
              **Original Commit:** \`${{ steps.check-updates.outputs.original_latest }}\`
              
              ### Details
              - Merge Status: ${{ steps.merge.outputs.merge_status }}
              - Transform Errors: ${{ steps.transform.outputs.transform_errors }}
              - Commit Status: ${{ steps.commit.outputs.commit_status }}
              
              Please review and resolve manually.`,
              labels: ['sync-issue', 'automated']
            })

      - name: Run self-improvement analysis
        if: always()
        run: |
          # Analyze failure patterns
          if [ -d ".gtd-sync/failures" ]; then
            FAILURE_COUNT=$(find .gtd-sync/failures -name "*.json" | wc -l)
            echo "Total failures recorded: $FAILURE_COUNT"
            
            # Common patterns
            if [ $FAILURE_COUNT -gt 0 ]; then
              echo "Failure patterns detected:"
              grep -h "transform_errors" .gtd-sync/failures/*.json 2>/dev/null | sort | uniq -c || true
            fi
          fi
          
          # Calculate success rate
          if [ -f .gtd-sync/sync-status.json ]; then
            TOTAL_SYNCS=$(cat .gtd-sync/sync-status.json | jq '.sync_history | length')
            SUCCESSFUL=$(cat .gtd-sync/sync-status.json | jq '.sync_history | map(select(.result == "success")) | length')
            if [ "$TOTAL_SYNCS" -gt 0 ]; then
              SUCCESS_RATE=$((SUCCESSFUL * 100 / TOTAL_SYNCS))
              echo "Success rate: $SUCCESS_RATE%"
            fi
          fi
