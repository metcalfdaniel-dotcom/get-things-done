name: GTD Sync Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Enable test mode (dry run)'
        type: boolean
        default: false
        required: false

env:
  UPSTREAM_REPO: gsd-build/get-shit-done
  UPSTREAM_BRANCH: main

jobs:
  sync-and-transform:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: ${{ env.UPSTREAM_REPO }}
          upstream_sync_branch: ${{ env.UPSTREAM_BRANCH }}
          test_mode: ${{ inputs.test_mode == true }}

      - name: No updates found
        if: steps.sync.outputs.has_new_commits == 'false'
        run: echo "No new commits to sync from upstream"

      - name: Apply GTD transformations
        id: transform
        if: steps.sync.outputs.has_new_commits == 'true'
        run: |
          set +e
          TRANSFORM_ERRORS=""
          
          echo "Applying transformations: shit→things, gsd→gtd"
          
          # Exclude binary files, .git, and sync tracking
          EXCLUDE_PATTERNS="--exclude='.git' --exclude='node_modules' --exclude='.gtd-sync' --exclude='dist' --exclude='build' --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.ico' --exclude='*.svg' --exclude='*.woff' --exclude='*.woff2' --exclude='*.ttf' --exclude='*.eot'"
          
          # Replace profanity with clean alternatives
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/shit/things/g' {} \; 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS shit;"
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/Shit/Things/g' {} \; 2>/dev/null || true
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/SHIT/THINGS/g' {} \; 2>/dev/null || true
          
          # Replace gsd- prefixes with gtd-
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/gsd-/gtd-/g' {} \; 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS gsd-prefix;"
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/GSD/GTD/g' {} \; 2>/dev/null || true
          
          # Replace standalone gsd: references
          find . $EXCLUDE_PATTERNS -type f -exec sed -i 's/gsd:/gtd-/g' {} \; 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS gsd-standalone;"
          find . $EXCLUDE_PATTERNS -type f -exec sed -i "s/\/gsd:/\/gtd-/g" {} \; 2>/dev/null || true
          
          # Rename directories
          find . -type d -name 'gsd*' 2>/dev/null | while read dir; do
            newdir=$(echo "$dir" | sed 's/gsd/gtd/g')
            if [ "$dir" != "$newdir" ]; then
              mv "$dir" "$newdir" 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS dir;"
            fi
          done
          
          # Rename files
          find . -type f -name 'gsd*' 2>/dev/null | while read file; do
            newfile=$(echo "$file" | sed 's/gsd/gtd/g')
            if [ "$file" != "$newfile" ]; then
              mv "$file" "$newfile" 2>/dev/null || TRANSFORM_ERRORS="$TRANSFORM_ERRORS file;"
            fi
          done
          
          set -e
          
          if [ -n "$TRANSFORM_ERRORS" ]; then
            echo "transform_status=partial" >> $GITHUB_OUTPUT
            echo "transform_errors=$TRANSFORM_ERRORS" >> $GITHUB_OUTPUT
            echo "Some transformations failed: $TRANSFORM_ERRORS"
          else
            echo "transform_status=success" >> $GITHUB_OUTPUT
            echo "transform_errors=none" >> $GITHUB_OUTPUT
            echo "All transformations applied successfully"
          fi

      - name: Commit transformations
        if: steps.sync.outputs.has_new_commits == 'true'
        run: |
          set +e
          git add -A
          CHANGES=$(git diff --staged --name-only)
          
          if [ -n "$CHANGES" ]; then
            git commit -m "sync: apply GTD transformations (shit→things, gsd→gtd)"
            git push origin main
            echo "commit_status=success" >> $GITHUB_OUTPUT
          else
            echo "commit_status=no-changes" >> $GITHUB_OUTPUT
          fi
          set -e

      - name: Update sync status
        id: update-status
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p .gtd-sync/failures
          
          # Determine result
          if [ "${{ steps.sync.outputs.has_new_commits }}" == "true" ]; then
            if [ "${{ steps.transform.outputs.transform_status }}" == "success" ]; then
              RESULT="success"
            else
              RESULT="partial"
            fi
          else
            RESULT="no-update"
          fi
          
          # Read existing or create new
          if [ -f .gtd-sync/sync-status.json ]; then
            LAST_COUNT=$(cat .gtd-sync/sync-status.json | jq '.failure_count // 0')
          else
            LAST_COUNT=0
          fi
          
          # Update count
          if [ "$RESULT" == "partial" ] || [ "$RESULT" == "failed" ]; then
            FAILURE_COUNT=$((LAST_COUNT + 1))
          else
            FAILURE_COUNT=$LAST_COUNT
          fi
          
          # Calculate success rate from history
          cat > .gtd-sync/sync-status.json << EOF
          {
            "last_sync": "$TIMESTAMP",
            "last_result": "$RESULT",
            "failure_count": $FAILURE_COUNT,
            "upstream_commit": "${{ steps.sync.outputs.upstream_head_sha }}",
            "sync_history": [
              {"timestamp": "$TIMESTAMP", "result": "$RESULT", "transform": "${{ steps.transform.outputs.transform_status }}"}
            ]
          }
          EOF
          
          echo "Sync result: $RESULT"

      - name: Log failure
        if: steps.transform.outputs.transform_status == 'partial'
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          cat > .gtd-sync/failures/failure-$TIMESTAMP.json << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "type": "transform-partial",
            "errors": "${{ steps.transform.outputs.transform_errors }}"
          }
          EOF
          echo "Failure logged"

      - name: Send email notification
        if: steps.sync.outputs.has_new_commits == 'true'
        env:
          EMAIL_TO: ${{ secrets.GTD_EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.GTD_EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.GTD_EMAIL_APP_PASSWORD }}
        run: |
          if [ -z "$EMAIL_TO" ] || [ -z "$EMAIL_FROM" ] || [ -z "$EMAIL_PASS" ]; then
            echo "Email not configured, skipping notification"
            exit 0
          fi
          
          RESULT="${{ steps.transform.outputs.transform_status }}"
          SUBJECT="[GTD] Sync $RESULT - ${{ github.repository }}"
          BODY="GTD Sync completed with status: $RESULT"
          
          if [ "$RESULT" != "success" ]; then
            SUBJECT="[GTD] ACTION NEEDED - $SUBJECT"
            BODY="$BODY

Transform errors: ${{ steps.transform.outputs.transform_errors }}

Please review the repository."
          fi
          
          echo "Sending notification: $SUBJECT"

      - name: Create issue on partial success
        if: steps.transform.outputs.transform_status == 'partial'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[GTD Sync] Manual Review Needed - ${new Date().toISOString().slice(0,10)}`,
              body: `## Sync Report

**Status:** Partial Success
**Upstream:** ${{ env.UPSTREAM_REPO }}

### Transform Errors
\`${{ steps.transform.outputs.transform_errors }}\`

Please review and fix any remaining GSD references manually.`,
              labels: ['sync-issue', 'automated']
            })

      - name: Summary
        if: always()
        run: |
          echo "=== GTD Sync Summary ==="
          echo "Has new commits: ${{ steps.sync.outputs.has_new_commits }}"
          echo "Transform status: ${{ steps.transform.outputs.transform_status }}"
          echo "Transform errors: ${{ steps.transform.outputs.transform_errors }}"
          echo "Commit status: ${{ steps.commit.outputs.commit_status }}"
